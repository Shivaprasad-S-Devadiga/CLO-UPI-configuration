kind: RubyInterestPolicy
apiVersion: rrsd.zetaapps.in/v1alpha1
metadata:
  name: lsg.ruby-dev.rubyinterestpolicy.upi-interest-policy
  labels:
    rrsd.zetaapps.in/day: day-zero
  namespace: ruby-dev
  annotations:
    zeta.tech/resource-tags: '{"gitDbRepo":"tenant_configuration.aws-upi-pp-mumbai.lsg","gitDbPath":"https://gitea.internal.mum1-pp.zetaapps.in/zetaengg/tenant_configuration.aws-upi-pp-mumbai.lsg.git","filePath":"/.upis/module_configurations/module_ruby-dev/tree/root/t0/module_configurations/module_ruby-dev/ruby-interest-policies/ruby-interest-policy-upi-interest-policy.yaml","tenantCode":"lsg"}'
spec:
  metadata:
    id: ruby-dev.rubyinterestpolicy.upi-interest-policy
    name: upi-interest-policy
    description: upi-interest-policy Ruby upi Interest Policy
    requester:
      module: ruby-dev
      moduleVersion: 0.0.1
    tenantId: '600309'
    tenantCode: lsg
  assessmentParameters:
    computationType: DAILYBALANCEWITHMONTHLYCOMPOUNDING
  code: INTUPI0001
  description: upi-interest-policy Ruby UPI Interest Policy
  liquidationParameters:
    dayCountMethod: ACTUAL/ACTUAL
    debitEffectiveFrom: ValueTime
    gracePeriodApplicableOnInterest: false
    interestThreshold: 0
    liquidationModels:
    - balanceType: retail
      billed: WaiveDeferredAndWaiveCurrentIfOpenBalPaidElseBillDeferredAndBillCurrent
      upiRateCard:
        code: IRTUPI00001
        version: '1'
      unBilled: DeferCurrentIfOpenBalPaidElseBillCurrent
    # - balanceType: cash
    #   billed: BillUnconditional
    #   upiRateCard:
    #     code: IRT<CC>00<XXXX>
    #     version: '1'
    #   unBilled: BillUnconditional
    minInterest: 100
    payOffVariance: 0
    paymentPostingCategory: rePayments
    roundingRule: NEAR
    roundingUnit: '2'
  name:  UPI Credit Line Interest Policy
  templateCode: IN-credit
  validFrom: 2026-04-17T00:00:00.000+05:30
  validTill: 2999-12-31T23:59:59.999+05:30
