  name: Emerald Closure Policy - Credit Line on UPI 
  description: Emerald Closure Policy for Credit Line on UPI product
  code: ECPIN009001
  allowCancellation: true   # UNCHANGED: customers are allowed to cancel an EMI loan within the cooling
  coolingPeriodForCancellation: 30 # CHANGED: cooling period reduced from 90 days to 30 days.
  allowPreClosure: true
  preClosureLockIn: 0   # Affluent-friendly stance - customer can foreclose anytime.
