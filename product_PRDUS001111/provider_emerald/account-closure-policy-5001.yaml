  # finance/ops threshold, not region-specific. Confirm with India product
  # owner whether affluent program wants same threshold.
  autoPreClosureThresholdPercentage: 89.99
  # UNCHANGED: on pre-closure, include any accrued-but-unbilled "catch-up"
  # interest in the final settlement amount. Keeps issuer P&L whole.
  includeCatchUpInterest: true/Users/pushpranjan/Desktop/tenant_configuration.aws-default-pp-mumbai.lsg/module_configurations/module_emerald/ang-policies
  templateCode: in-credit
